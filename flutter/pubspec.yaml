name: ob_dump_reader_flutter
description: "Flutter-ready ObjectBox LMDB reader toolkit"
version: 0.1.0-alpha.2
homepage: https://github.com/o-murphy/ob-dump
# TODO(release): remove this line together with the path dep below —
# `flutter analyze` actually *fails* (exit 1, not just a warning; verified
# via CI, not assumed) on "path dependencies aren't publishable" without it.
# See docs/BACKLOG.md phased-plan item 17/18 for the release process.
publish_to: none
environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.29.0'
dependencies:
  flutter:
    sdk: flutter
  # TODO(release): path dep only works pre-publish. Before actually
  # publishing this package, replace with a real version constraint on
  # ob_dump_reader from pub.dev, e.g. `^<matching version>` — see
  # docs/BACKLOG.md phased-plan item 17/18 for the release process (both
  # packages' versions must stay in lockstep; CI enforces this).
  ob_dump_reader:
    path: ../dart

# `ffiPlugin: true` (not `pluginClass:`) — this plugin has no method-channel
# surface at all, only native code to build and bundle for dart:ffi. That's
# exactly what `ffiPlugin` is for (confirmed against the official
# `flutter create --template=plugin_ffi` scaffold) — no Java/Kotlin/Swift/
# ObjC registration class needed on any platform.
flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
