name: ob_dump_reader_flutter
description: "Flutter-ready ObjectBox LMDB reader toolkit"
version: 0.1.0-beta.1
homepage: https://github.com/o-murphy/ob-dump
environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.29.0'
dependencies:
  flutter:
    sdk: flutter
  # Real pub.dev constraint — this is what a consumer installing the
  # published package actually resolves. Kept in lockstep with
  # dart/pubspec.yaml's `version:` (.github/workflows/version-parity.yml
  # checks both, plus this line, on every push/PR).
  ob_dump_reader: ^0.1.0-beta.1

# Local/CI dev always builds against this monorepo's own dart/ package
# instead of whatever's on pub.dev. dependency_overrides is never seen by
# anyone depending on the published ob_dump_reader_flutter package (it
# only applies when this package itself is the workspace root being
# resolved), so — unlike the plain `path:` dependency this replaced —
# nothing here needs an ephemeral CI-only rewrite before `pub publish`;
# the analyzer's "path dependencies aren't publishable" check
# (dart-lang/sdk pkg/analyzer/lib/src/pubspec/validators/dependency_validator.dart)
# only inspects `dependencies`/`dev_dependencies`, never
# `dependency_overrides`.
dependency_overrides:
  ob_dump_reader:
    path: ../dart

# `ffiPlugin: true` (not `pluginClass:`) — this plugin has no method-channel
# surface at all, only native code to build and bundle for dart:ffi. That's
# exactly what `ffiPlugin` is for (confirmed against the official
# `flutter create --template=plugin_ffi` scaffold) — no Java/Kotlin/Swift/
# ObjC registration class needed on any platform.
flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
