name: Release

# Triggered by pushing a tag like v1.2.3 — that one tag drives everything:
# the C++ core's ob_dump_version(), and both dart/ and flutter/ pubspec
# versions (which must always match each other — see
# .github/workflows/version-parity.yml and docs/BACKLOG.md item 18).
on:
  push:
    tags:
      - "v*"

env:
  RELEASE_TAG: ${{ github.ref_name }}

jobs:
  # ── 1 + 5 (cpp half): build the CLI/shared-lib for every platform we
  # claim to support, run its test suite, package + upload artifacts. ──────
  build-cpp:
    strategy:
      fail-fast: false
      matrix:
        include:
          # All native builds — no cross-compilation/QEMU involved. Runner
          # labels confirmed current via actions/runner-images' own README
          # (ubuntu-24.04-arm and windows-11-arm are GA, not preview).
          - { os: ubuntu-latest,    name: linux-x64 }
          - { os: ubuntu-24.04-arm, name: linux-arm64 }
          - { os: windows-latest,   name: windows-x64 }
          - { os: windows-11-arm,   name: windows-arm64 }
          # Universal binary (both archs in one file via Xcode/clang +
          # lipo) rather than two separate macOS legs. Quoted so the
          # embedded ";" survives substitution into the shell command below
          # instead of bash reading it as a command separator.
          - { os: macos-latest,     name: macos-universal, cmake_extra: '-DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      # windows-11-arm/ubuntu-24.04-arm run the tests natively (real ARM64
      # hosts) — no emulation, no skipped tests, unlike a cross-compiled
      # binary would need.
      - name: Build + test
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"  # tag is "v1.2.3", pubspecs/OB_DUMP_VERSION want bare "1.2.3"
          OB_DUMP_VERSION="$VERSION" ./scripts/ci/build-cpp.sh ${{ matrix.cmake_extra }}

      - name: Package
        shell: bash
        run: ./scripts/ci/package-cpp.sh ${{ matrix.name }}

      - uses: actions/upload-artifact@v7
        with:
          name: ob-dump-${{ matrix.name }}
          path: ob-dump-${{ matrix.name }}.tar.gz

  # ── 3 + 5 (dart half) ──────────────────────────────────────────────────
  test-dart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dart-lang/setup-dart@v1
      - run: ./scripts/ci/test-dart.sh

  # ── 4 + 5 (flutter half) ───────────────────────────────────────────────
  test-flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: ./scripts/ci/test-flutter.sh

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.0
      - run: ./scripts/ci/test-python.sh

  # Single guard job every build/test leg feeds into — downstream jobs
  # depend on this one instead of repeating the full leg list, so adding a
  # new language/platform leg later only means adding it here, not hunting
  # down every job's needs: list.
  tests-passed:
    needs: [build-cpp, test-dart, test-flutter, test-python]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All build/test legs passed."

  # ── 2: bump both pubspecs to the tag's version, commit + push to main ──
  bump-versions:
    needs: tests-passed
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: main

      - name: Extract version and detect pre-release
        id: meta
        run: |
          VERSION="${RELEASE_TAG#v}"
          if [[ "$RELEASE_TAG" =~ (alpha|beta|rc) ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump dart/pubspec.yaml and flutter/pubspec.yaml (lockstep)
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          sed -i "s/^version: .*/version: $VERSION/" dart/pubspec.yaml
          sed -i "s/^version: .*/version: $VERSION/" flutter/pubspec.yaml
          grep '^version:' dart/pubspec.yaml flutter/pubspec.yaml

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dart/pubspec.yaml flutter/pubspec.yaml
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.meta.outputs.version }}"
          git push origin main

  # ── 6: create the GitHub release, attaching every platform's archive ───
  create-release:
    needs: bump-versions
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # This is post-bump (bump-versions pushed to main just above).
      # fetch-tags: true — actions/checkout@v7 defaults this to false
      # *independently* of fetch-depth: 0 (confirmed via a real run's own
      # "fetch-tags: false" log line, not assumed); without it the PREV_TAG
      # lookup below silently finds nothing on every release, not just this
      # first one where there happens to be no previous tag anyway.
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/download-artifact@v8
        with:
          pattern: ob-dump-*
          path: artifacts
          merge-multiple: true

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${{ needs.bump-versions.outputs.version }}"
          ./scripts/ci/extract-changelog.sh "$VERSION" CHANGELOG.md > /tmp/release_notes.md

          if [ ! -s /tmp/release_notes.md ]; then
            echo "No changelog entry found for $VERSION (or [Unreleased]) in CHANGELOG.md — add one first"
            exit 1
          fi

          # Same "Full Changelog" compare-link footer convention GitHub's
          # own auto-generated release notes use.
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${RELEASE_TAG}$" | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            {
              echo ""
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${RELEASE_TAG}"
            } >> /tmp/release_notes.md
          fi

          echo "--- release notes ---"
          cat /tmp/release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: /tmp/release_notes.md
          prerelease: ${{ needs.bump-versions.outputs.prerelease }}
          files: artifacts/*.tar.gz

  # ── 7: publish ob_dump_reader to pub.dev ────────────────────────────────
  publish-dart:
    needs: [bump-versions, create-release]
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # pub.dev OIDC trusted publisher — configure this
                       # package for trusted publishing on pub.dev first.
    defaults:
      run:
        working-directory: dart
    steps:
      # `main` already has bump-versions' commit; the tag itself still
      # points at the pre-bump commit, so we can't just use github.ref.
      - uses: actions/checkout@v7
        with:
          ref: main

      - uses: dart-lang/setup-dart@v1
      - run: dart pub get

      # pub.dev refuses to publish a package without its own CHANGELOG.md —
      # generated fresh from the repo root's CHANGELOG.md, in this ephemeral
      # checkout only (never committed back, same as publish-flutter's own
      # pubspec.yaml rewrite below).
      - name: Generate CHANGELOG.md
        working-directory: .
        run: python3 scripts/ci/sync_changelogs.py dart

      - run: dart pub publish --dry-run
      - name: Publish to pub.dev
        run: dart pub publish --force

  # ── 8: publish ob_dump_reader_flutter — gated behind manual approval to
  # give pub.dev's index time to catch up with the dart/ publish above
  # before this package's dependency on it tries to resolve. ─────────────
  publish-flutter:
    # bump-versions listed explicitly (not just publish-dart) because
    # needs.<job>.outputs is only accessible for *direct* dependencies —
    # bump-versions is otherwise only a transitive one via publish-dart,
    # and this job needs its version output below.
    needs: [publish-dart, bump-versions]
    runs-on: ubuntu-latest
    environment: pub-publish-flutter  # requires a "required reviewers"
                                       # protection rule configured in this
                                       # repo's Settings > Environments —
                                       # not something a workflow file can
                                       # set up by itself.
    permissions:
      id-token: write  # pub.dev OIDC trusted publisher
    defaults:
      run:
        working-directory: flutter
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: "Make pubspec.yaml publishable (path dep + publish_to: none)"
        run: |
          VERSION="${{ needs.bump-versions.outputs.version }}"
          flutter pub remove ob_dump_reader
          flutter pub add "ob_dump_reader@^$VERSION"
          # `publish_to: none` blocks `pub publish` outright, same as the
          # path dep — `pub remove/add` only manage dependencies, not this
          # top-level field, so it needs its own edit.
          sed -i '/^publish_to: none$/d' pubspec.yaml
          # Neither edit is committed — dart/pubspec.yaml in the repo keeps
          # `publish_to: none` and the path dep for local dev; this rewrite
          # only exists in this ephemeral checkout, purely so `pub publish`
          # sees a publishable pubspec.
          grep -A1 '^  ob_dump_reader' pubspec.yaml
          grep -q '^publish_to:' pubspec.yaml && echo "ERROR: publish_to still present" && exit 1 || true

      - name: flutter pub get
        run: flutter pub get
      - name: flutter analyze
        run: flutter analyze

      # See publish-dart's identical step above for why this has to be
      # generated (not committed) — same reasoning.
      - name: Generate CHANGELOG.md
        working-directory: .
        run: python3 scripts/ci/sync_changelogs.py flutter

      - name: flutter pub publish --dry-run
        run: flutter pub publish --dry-run
      - name: Publish to pub.dev
        run: flutter pub publish --force

  # ── 9: publish ob-dump-reader to PyPI ───────────────────────────────────
  publish-pypi:
    needs: [bump-versions, create-release]
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # PyPI trusted publishing — configure this package
                       # for trusted publishing on PyPI first.

    environment:
      name: pypi  # requires a "required reviewers" protection rule
                  # configured in this repo's Settings > Environments —
                  # not something a workflow file can set up by itself.

    defaults:
      run:
        working-directory: py  # missing entirely before — every uv command
                                # below failed immediately with "No
                                # pyproject.toml found" since this job never
                                # actually ran (caught by trying `uv sync`
                                # from the repo root locally, not assumed).

    steps:
      # fetch-depth: 0 AND fetch-tags: true — setuptools_scm derives the
      # package version from the git tag via `git describe`. Both are
      # needed: fetch-depth: 0 alone still left fetch-tags defaulting to
      # false (confirmed via a real run — the actual published PyPI
      # version came out as 0.0.0.dev0, pyproject.toml's fallback_version,
      # not the real 0.1.0a1). Also needs py/pyproject.toml's own
      # [tool.setuptools_scm] root = ".." — the git root is the repo root,
      # one level up from py/, not py/ itself.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.0

      - name: Install the project
        run: uv sync --dev

      - name: Build
        run: uv build

      - name: Publish
        run: uv publish --trusted-publishing always
