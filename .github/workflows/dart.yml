name: Dart CI

on: [push, pull_request]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: dart
    steps:
      - uses: actions/checkout@v7
      - uses: dart-lang/setup-dart@v1

      - run: dart pub get

      # dart_lmdb2 ships prebuilt native libraries but doesn't fetch them on
      # `pub get` — this step is required before first use, per its README.
      - run: dart run dart_lmdb2:fetch_native

      - run: dart analyze
      - run: dart test
