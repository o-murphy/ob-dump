name: C++ CI

on: [push, pull_request]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build --config Release --parallel

      # -C Release is a no-op on single-config generators (Linux/macOS
      # Makefiles) and required on Windows' multi-config Visual Studio
      # generator.
      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release
