name: C++ CI

on: [push, pull_request]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      # -C Release is a no-op on single-config generators (Linux/macOS
      # Makefiles) and required on Windows' multi-config Visual Studio
      # generator.
      - name: Build + test
        shell: bash
        run: ./scripts/ci/build-cpp.sh

      - name: Package
        shell: bash
        run: ./scripts/ci/package-cpp.sh ${{ matrix.os }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ob-dump-${{ matrix.os }}
          path: ob-dump-${{ matrix.os }}.tar.gz
