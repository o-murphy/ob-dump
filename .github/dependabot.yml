version: 2
updates:
  # dart/ob_dump_reader's one real dependency (dart_lmdb2) and dev
  # dependencies (test, flat_buffers).
  - package-ecosystem: "pub"
    directory: "/dart"
    schedule:
      interval: "weekly"
    groups:
      flutter-updates:
        patterns:
          - "flutter*"
        update-types:
          - "minor"
          - "patch"
  
  # flutter/ob_dump_reader_flutter's dependencies: ob_dump_reader (path dep,
  # not tracked by Dependabot) and flutter_lmdb2 — the one that actually
  # matters here, since it's what pulls in the native plugin bundling.
  - package-ecosystem: "pub"
    directory: "/flutter"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  # NOTE: the C++ core's dependencies (lmdb, flatbuffers, nlohmann/json) are
  # pinned via `GIT_TAG` in the root CMakeLists.txt's FetchContent_Declare
  # calls — Dependabot has no "cmake"/FetchContent ecosystem, so those
  # version bumps stay manual.
