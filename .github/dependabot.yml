version: 2
updates:
  # ob-dump-reader's dependencies (flatbuffers, lmdb) and dev dependencies
  # (orjson, pytest, ruff). "uv" (not "pip") since this package is managed
  # via uv.lock — "pip" doesn't understand that lockfile format, only
  # requirements.txt/Pipfile/plain pyproject.toml (confirmed via GitHub's
  # own Dependabot changelog: uv got native ecosystem support in March
  # 2025, understanding pyproject.toml + uv.lock directly).
  - package-ecosystem: "uv"
    directory: "py/"
    schedule:
      interval: "weekly"
    groups:
      python-dependencies:
        patterns:
          - "*"

  # js/ob-dump-reader's dependencies (flatbuffers, lmdb) and dev dependencies
  # (typescript, vitest, @types/node).
  - package-ecosystem: "npm"
    directory: "js/"
    schedule:
      interval: "weekly"
    groups:
      js-dependencies:
        patterns:
          - "*"

  # dart/ob_dump_reader's dependencies (ffi, path) and dev dependencies
  # (test, flat_buffers). LMDB itself isn't a pub.dev dependency — it's
  # vendored source (src/lmdb/), pinned via LMDB_VERSION at the repo root,
  # not tracked by Dependabot (see the NOTE below).
  - package-ecosystem: "pub"
    directory: "/dart"
    schedule:
      interval: "weekly"
    groups:
      dart-dependencies:
        patterns:
          - "*"

  # flutter/ob_dump_reader_flutter's real dependencies: the `flutter` SDK
  # itself (grouped below) and `ob_dump_reader` — a real `^X.Y.Z` pub.dev
  # constraint now (see docs/BACKLOG.md item 25), not the bare path dep it
  # used to be, so Dependabot *would* see it — but there's nothing for it
  # to bump: this repo's release.yml always bumps both packages' versions
  # together in one commit, so a newer `ob_dump_reader` never exists
  # without `flutter/pubspec.yaml`'s constraint already matching it. Its
  # own vendored LMDB copy (src/lmdb/) is pinned via LMDB_VERSION, not a
  # pub.dev dep either way.
  - package-ecosystem: "pub"
    directory: "/flutter"
    schedule:
      interval: "weekly"
    groups:
      flutter-updates:
        patterns:
          - "flutter*"
        update-types:
          - "minor"
          - "patch"
      flutter-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  # NOTE: LMDB's version is pinned once in LMDB_VERSION at the repo root
  # (read by the C++ core's CMakeLists.txt FetchContent_Declare; dart/ and
  # flutter/'s own vendored copies under src/lmdb/ must be bumped to match
  # by hand — see scripts/ci/verify-lmdb-vendor.sh, which checks all three
  # stay in sync). flatbuffers and nlohmann/json are likewise pinned via
  # `GIT_TAG` in the root CMakeLists.txt. Dependabot has no "cmake"/
  # FetchContent ecosystem, so all of these version bumps stay manual.
