name: ob_dump_reader
description: >
  Minimal ObjectBox LMDB reader toolkit — walks a data.mdb file and hands you
  each record's raw FlatBuffers table bytes plus its entity/object id, plus
  ToMany relation links and Flex/ExternalPropertyType decode helpers that
  `flatc --dart` output can't provide on its own. Pair with `ob_dump --fbs`/
  `--schema` and `flatc --dart` to decode standard fields into typed objects
  without any native/FFI dependency: this package only depends on dart_lmdb2
  (pure Dart-callable, no FFI to ob-dump's own C++ core) and flat_buffers
  (the same official runtime `flatc --dart` output already depends on).
version: 0.1.0-alpha.0
homepage: https://github.com/o-murphy/ob-dump
environment:
  sdk: '>=3.5.0 <4.0.0'
dependencies:
  dart_lmdb2: ^0.9.12
  flat_buffers: ^25.9.23
dev_dependencies:
  test: ^1.25.0
