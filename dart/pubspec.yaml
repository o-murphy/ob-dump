name: ob_dump_reader
description: >
  Minimal ObjectBox LMDB reader toolkit — walks a data.mdb file and hands you
  each record's raw FlatBuffers table bytes plus its entity/object id, plus
  ToMany relation links and Flex/ExternalPropertyType decode helpers that
  `flatc --dart` output can't provide on its own. Pair with `ob_dump --fbs`/
  `--schema` and `flatc --dart` to decode standard fields into typed objects.
  Talks to LMDB directly via a small, purpose-built dart:ffi binding over the
  vendored LMDB C source (no dependency on ob-dump's own C++ core, and no
  dependency on any third-party LMDB wrapper package) — run
  `dart run ob_dump_reader:build` once to compile it for your platform.
version: 0.2.0-alpha.0
homepage: https://github.com/o-murphy/ob-dump
environment:
  sdk: '>=3.5.0 <4.0.0'
dependencies:
  ffi: ^2.1.4
  flat_buffers: ^25.9.23
  path: ^1.9.1
dev_dependencies:
  test: ^1.25.0

executables:
  build: build
